<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Your Toy — Brighten</title>

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/ar.css" />
  <link rel="stylesheet" href="../css/transition.css" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    /* Additional styles for test mode */
    #test-mode-btn {
      background: rgba(255,255,255,0.15) !important;
      color: white !important;
      border: 1px solid rgba(255,255,255,0.3) !important;
      padding: 6px 12px !important;
      border-radius: 20px !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      font-family: var(--font-body) !important;
      transition: background 0.2s !important;
      text-decoration: none !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
    }
    
    #test-mode-btn:hover {
      background: rgba(255,255,255,0.25) !important;
    }
    
    #test-mode-panel {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      z-index: 300;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      display: none;
      max-width: 360px;
      width: 90%;
      border: 2px solid var(--dark);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    #test-mode-panel.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    
    .test-panel-title {
      margin-bottom: 20px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      text-align: center;
    }
    
    .test-career-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .test-career-card {
      padding: 16px 10px;
      border: 2px solid var(--dark);
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
      color: var(--dark);
      box-shadow: 4px 4px 0 var(--dark);
      text-align: center;
    }
    
    .test-career-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--dark);
      background: #fafafa;
    }
    
    .test-career-emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }
    
    .test-career-name {
      font-size: 14px;
      font-weight: 700;
    }
    
    .test-panel-close {
      width: 100%;
      padding: 12px;
      background: #f0f0f0;
      border: 2px solid var(--dark);
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      box-shadow: 3px 3px 0 var(--dark);
    }

    .test-panel-close:hover {
      background: var(--dark);
      color: white;
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--dark);
    }
    
    .test-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 250;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    
    .test-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* 修复按钮重叠问题 */
    .chat-full-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: white;
      border: 3px solid var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      font-weight: 700;
      color: var(--dark);
      transition: all 0.2s;
      box-shadow: 3px 3px 0 var(--dark);
      z-index: 10;
    }

    .chat-full-close:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--dark);
      background: var(--coral);
      color: white;
    }

    .chat-header-actions {
      display: flex;
      gap: 12px;
      margin-right: 60px;
    }

    @media (max-width: 600px) {
      .chat-full-close {
        width: 38px;
        height: 38px;
        font-size: 20px;
        top: 16px;
        right: 16px;
      }
      
      .chat-header-actions {
        margin-right: 50px;
        gap: 8px;
      }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="top-bar">
    <a href="home.html">← Home</a>
    <img src="../assets/Brighten-logo.png" alt="Brighten" class="logo-img" />
    <div style="display: flex; gap: 8px;">
      <button id="test-mode-btn">🧪 Test</button>
      <a href="careers.html">Careers</a>
    </div>
  </div>

  <!-- Test Backdrop -->
  <div class="test-backdrop" id="test-backdrop"></div>

  <!-- Test Mode Panel -->
  <div id="test-mode-panel">
    <div class="test-panel-title">✨ Select a Career to Test</div>
    <div class="test-career-grid">
      <div class="test-career-card" data-career='{"id":"programmer","name":"Programmer","tag":"Technology","img":"../assets/characters/char-programmer.png"}'>
        <span class="test-career-emoji">💻</span>
        <span class="test-career-name">Programmer</span>
      </div>
      <div class="test-career-card" data-career='{"id":"police","name":"Police Officer","tag":"Public Safety","img":"../assets/characters/char-police.png"}'>
        <span class="test-career-emoji">👮</span>
        <span class="test-career-name">Police</span>
      </div>
      <div class="test-career-card" data-career='{"id":"teacher","name":"Teacher","tag":"Education","img":"../assets/characters/char-teacher.png"}'>
        <span class="test-career-emoji">📚</span>
        <span class="test-career-name">Teacher</span>
      </div>
      <div class="test-career-card" data-career='{"id":"farmer","name":"Farmer","tag":"Agriculture","img":"../assets/characters/char-farmer.png"}'>
        <span class="test-career-emoji">🌾</span>
        <span class="test-career-name">Farmer</span>
      </div>
      <div class="test-career-card" data-career='{"id":"doctor","name":"Doctor","tag":"Healthcare","img":"../assets/characters/char-doctor.png"}'>
        <span class="test-career-emoji">👨‍⚕️</span>
        <span class="test-career-name">Doctor</span>
      </div>
      <div class="test-career-card" data-career='{"id":"astronaut","name":"Astronaut","tag":"Space","img":"../assets/characters/char-astronaut.png"}'>
        <span class="test-career-emoji">🚀</span>
        <span class="test-career-name">Astronaut</span>
      </div>
    </div>
    <button class="test-panel-close" id="close-test-panel">Cancel</button>
  </div>

  <!-- Scanning Hint -->
  <div id="hint">📷 Point at your toy to scan</div>

  <!-- AR SCENE -->
  <div id="ar-container">
    <a-scene
      mindar-image="imageTargetSrc: ../assets/targets.mind;"
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true"
    >
      <a-entity mindar-image-target="targetIndex: 0" id="ar-target-0">
        <a-image src="../assets/characters/char-programmer.png" position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 1" id="ar-target-1">
        <a-image src="../assets/characters/char-police.png" position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 2" id="ar-target-2">
        <a-image src="../assets/characters/char-teacher.png" position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 3" id="ar-target-3">
        <a-image src="../assets/characters/char-farmer.png" position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 4" id="ar-target-4">
        <a-image src="../assets/characters/char-doctor.png" position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>
      <a-entity mindar-image-target="targetIndex: 5" id="ar-target-5">
        <a-image src="../assets/characters/char-astronaut.png" position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>
      <a-camera position="0 0 0"></a-camera>
    </a-scene>
  </div>

  <!-- ============================================ -->
  <!-- TRANSITION OVERLAY -->
  <!-- ============================================ -->
  <div id="transition-overlay">
    <div class="transition-bg">
      <div class="transition-orb"></div>
      <div class="transition-orb"></div>
      <div class="transition-orb"></div>
    </div>
    
    <div id="transition-sparkles"></div>
    
    <div class="transition-character">
      <img id="transition-char-img" class="transition-character-img" src="" alt="">
      <h2 id="transition-char-name" class="transition-career-name"></h2>
      <span id="transition-char-tag" class="transition-career-tag"></span>
    </div>
    
    <div class="transition-loading">
      <div class="loading-text">
        <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
      </div>
      <div class="loading-bar-container">
        <div class="loading-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- FULLSCREEN CHAT OVERLAY -->
  <!-- ============================================ -->
  <div id="fullscreen-chat">
    <button class="chat-full-close" id="close-fullscreen-chat">✕</button>
    
    <div class="chat-full-header">
      <div class="chat-header-left">
        <img id="chat-avatar" class="chat-header-avatar" src="" alt="">
        <div class="chat-header-info">
          <h3 id="chat-career-name">Programmer</h3>
          <div class="chat-header-status">
            <span class="status-dot"></span>
            <span>Online • Ready to chat!</span>
          </div>
        </div>
      </div>
      <div class="chat-header-actions">
        <!-- Clear chat button removed -->
      </div>
    </div>
    
    <div class="chat-full-messages" id="fullscreen-messages"></div>
    
    <div class="chat-full-input-area">
      <div class="chat-full-presets" id="fullscreen-presets"></div>
      <div class="chat-full-input-row">
        <input type="text" class="chat-full-input" id="fullscreen-input" placeholder="Ask me anything..." />
        <button class="chat-full-send" id="fullscreen-send">📤</button>
      </div>
    </div>
  </div>

  <!-- Original Chat UI (hidden, used for compatibility) -->
  <div id="chat-ui" style="display:none;">
    <div id="chat-character-name"></div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <div id="chat-presets"></div>
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="Ask me anything..." />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script src="../js/ar.js"></script>
  <script src="../js/chat.js"></script>
  <script>
    (function() {
      'use strict';
      
      // Career data with images and tags
      const CAREER_DATA = {
        programmer: { name: 'Programmer', tag: 'Technology', img: '../assets/characters/char-programmer.png' },
        police: { name: 'Police Officer', tag: 'Public Safety', img: '../assets/characters/char-police.png' },
        teacher: { name: 'Teacher', tag: 'Education', img: '../assets/characters/char-teacher.png' },
        farmer: { name: 'Farmer', tag: 'Agriculture', img: '../assets/characters/char-farmer.png' },
        doctor: { name: 'Doctor', tag: 'Healthcare', img: '../assets/characters/char-doctor.png' },
        astronaut: { name: 'Astronaut', tag: 'Space', img: '../assets/characters/char-astronaut.png' }
      };
      
      let isTestMode = false;
      let isTransitioning = false;
      let currentCareerData = null;
      
      // DOM Elements
      const testBtn = document.getElementById('test-mode-btn');
      const testPanel = document.getElementById('test-mode-panel');
      const testBackdrop = document.getElementById('test-backdrop');
      const closeTestBtn = document.getElementById('close-test-panel');
      const transitionOverlay = document.getElementById('transition-overlay');
      const fullscreenChat = document.getElementById('fullscreen-chat');
      const arContainer = document.getElementById('ar-container');
      const hint = document.getElementById('hint');
      
      // Transition elements
      const transCharImg = document.getElementById('transition-char-img');
      const transCharName = document.getElementById('transition-char-name');
      const transCharTag = document.getElementById('transition-char-tag');
      const sparklesContainer = document.getElementById('transition-sparkles');
      
      // Fullscreen chat elements
      const chatAvatar = document.getElementById('chat-avatar');
      const chatCareerName = document.getElementById('chat-career-name');
      const fullscreenMessages = document.getElementById('fullscreen-messages');
      const fullscreenPresets = document.getElementById('fullscreen-presets');
      const fullscreenInput = document.getElementById('fullscreen-input');
      const fullscreenSend = document.getElementById('fullscreen-send');
      const closeChatBtn = document.getElementById('close-fullscreen-chat');
      
      // ============================================
      // TRANSITION ANIMATION
      // ============================================
      function createSparkles() {
        sparklesContainer.innerHTML = '';
        const emojis = ['✨', '⭐', '🌟', '💫', '🎈', '🎉', '💖', '🌈'];
        
        for (let i = 0; i < 30; i++) {
          const sparkle = document.createElement('div');
          sparkle.className = 'transition-sparkle';
          sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          sparkle.style.left = Math.random() * 100 + '%';
          sparkle.style.top = Math.random() * 100 + '%';
          sparkle.style.animationDelay = Math.random() * 2 + 's';
          sparkle.style.fontSize = (16 + Math.random() * 30) + 'px';
          sparklesContainer.appendChild(sparkle);
        }
      }
      
      async function showTransition(career) {
        return new Promise((resolve) => {
          isTransitioning = true;
          
          // Set career data
          const data = CAREER_DATA[career.id] || { name: career.name, tag: 'Career', img: '../assets/characters/char-programmer.png' };
          currentCareerData = { ...career, ...data };
          
          transCharImg.src = data.img;
          transCharName.textContent = data.name;
          transCharTag.textContent = data.tag;
          
          createSparkles();
          
          // Show transition overlay
          transitionOverlay.classList.add('active');
          
          // Hide AR hint
          hint.style.opacity = '0';
          
          // Resolve after animation completes
          setTimeout(() => {
            transitionOverlay.classList.remove('active');
            isTransitioning = false;
            resolve();
          }, 2800);
        });
      }
      
      // ============================================
      // FULLSCREEN CHAT
      // ============================================
      function showFullscreenChat(career) {
        // Set avatar and name
        chatAvatar.src = career.img || `../assets/characters/char-${career.id}.png`;
        chatCareerName.textContent = career.name;
        
        // Show fullscreen chat
        fullscreenChat.classList.add('active');
        
        // Initialize chat in fullscreen mode
        initFullscreenChat(career);
      }
      
      function initFullscreenChat(career) {
        // Clear messages
        fullscreenMessages.innerHTML = '';
        
        // Setup presets
        const presets = getPresetsForCareer(career.id);
        fullscreenPresets.innerHTML = presets.map(p => 
          `<button class="preset-btn" data-question="${p}">${p}</button>`
        ).join('');
        
        // Initialize chat.js system if available
        if (typeof initChat === 'function') {
          try {
            // Create a wrapper to make chat.js work with fullscreen elements
            setupChatJSAdapter();
            
            // Initialize chat.js with the career data
            initChat(career);
            
            console.log('chat.js initialized successfully for:', career.name);
          } catch (error) {
            console.error('Failed to initialize chat.js:', error);
            // Fallback: add welcome message
            addFullscreenMessage('assistant', `Hi! I'm a ${career.name}! Ask me anything about my job! 😊`);
          }
        } else {
          // Fallback if chat.js is not loaded
          console.warn('chat.js not loaded, using fallback chat');
          addFullscreenMessage('assistant', `Hi! I'm a ${career.name}! Ask me anything about my job! 😊`);
        }
        
        // Setup event listeners
        setupFullscreenListeners(career);
      }
      
      // Adapter to make chat.js work with fullscreen elements
      function setupChatJSAdapter() {
        // Override DOM element getters for chat.js
        const originalGetElementById = document.getElementById;
        
        document.getElementById = function(id) {
          // Map chat.js IDs to fullscreen IDs
          const idMap = {
            'chat-messages': 'fullscreen-messages',
            'chat-input': 'fullscreen-input',
            'chat-send': 'fullscreen-send',
            'chat-presets': 'fullscreen-presets',
            'chat-character-name': 'chat-career-name'
          };
          
          const mappedId = idMap[id] || id;
          return originalGetElementById.call(document, mappedId);
        };
        
        // Override addMessage to use fullscreen messages container
        if (window.addMessage) {
          const originalAddMessage = window.addMessage;
          window.addMessage = function(role, content, animate = true) {
            // Use fullscreen message function
            addFullscreenMessage(role, content);
          };
        }
        
        // Override addMessageWithTypewriter if needed
        if (window.addMessageWithTypewriter) {
          const originalAddMessageWithTypewriter = window.addMessageWithTypewriter;
          window.addMessageWithTypewriter = function(role, content) {
            return new Promise(resolve => {
              addFullscreenMessage(role, content);
              resolve();
            });
          };
        }
        
        console.log('Chat.js adapter setup complete');
      }
      
      function getPresetsForCareer(careerId) {
        const presets = {
          programmer: ["Can you tell me all about what programmers do every day? 💻", "What's the most exciting project you've ever worked on?", "How did you learn to code and what advice do you have for kids?"],
          police: ["Can you share some interesting stories about helping people in your community? 🚔", "What does a typical day look like for a police officer?", "How do you train to become a police officer and what skills are important?"],
          teacher: ["What's your favorite thing about teaching and why? 📚", "Can you share a story about a student who really inspired you?", "How do you make difficult subjects fun and easy to understand?"],
          farmer: ["Can you tell me all about life on a farm and what you do each day? 🐄", "What's the most interesting thing about growing food and caring for animals?", "How do the seasons affect your work on the farm?"],
          doctor: ["Can you explain what doctors do to help people stay healthy? 🩺", "What's the most rewarding part of being a doctor?", "How does the human body work and what are some cool facts about it?"],
          astronaut: ["Can you describe what it's really like to live and work in space? 🚀", "What was the most amazing thing you saw in space?", "How do astronauts train and prepare for space missions?"]
        };
        return presets[careerId] || ["Can you tell me all about your job?", "Why is your work important for our community?", "What's the most interesting part of what you do every day?"];
      }
      
      function addFullscreenMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.textContent = content;
        fullscreenMessages.appendChild(msgDiv);
        fullscreenMessages.scrollTop = fullscreenMessages.scrollHeight;
      }
      
      function setupFullscreenListeners(career) {
        // Preset buttons
        fullscreenPresets.querySelectorAll('.preset-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const question = btn.dataset.question;
            fullscreenInput.value = question;
            sendFullscreenMessage(career);
          });
        });
        
        // Send button
        fullscreenSend.addEventListener('click', () => sendFullscreenMessage(career));
        
        // Enter key
        fullscreenInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            sendFullscreenMessage(career);
          }
        });
      }
      
      async function sendFullscreenMessage(career) {
        const message = fullscreenInput.value.trim();
        if (!message) return;
        
        // Clear input and disable send button
        fullscreenInput.value = '';
        fullscreenSend.disabled = true;
        
        // Use chat.js sendMessage if available
        if (typeof sendMessage === 'function') {
          try {
            // Call chat.js sendMessage function
            // Note: sendMessage will handle adding user message and API call
            await sendMessage(message);
            
          } catch (error) {
            console.error('Error calling sendMessage:', error);
            
            // Fallback: show error message
            document.getElementById('typing-indicator-fs')?.remove();
            addFullscreenMessage('assistant', "Oops! Something went wrong. Let me try again! 🤔");
            
            fullscreenSend.disabled = false;
            fullscreenInput.focus();
          }
        } else {
          // Fallback: simulate API call
          addFullscreenMessage('user', message);
          fullscreenSend.disabled = true;
          
          // Show typing indicator
          const typingDiv = document.createElement('div');
          typingDiv.className = 'message assistant';
          typingDiv.id = 'typing-indicator-fs';
          typingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
          fullscreenMessages.appendChild(typingDiv);
          
          setTimeout(() => {
            document.getElementById('typing-indicator-fs')?.remove();
            
            const responses = [
              "That's a great question! I love talking about my job! 🌟",
              "Let me tell you all about it! Every day is different and exciting! ✨",
              "Great question! I'm so happy you asked about that! 💫"
            ];
            const response = responses[Math.floor(Math.random() * responses.length)];
            addFullscreenMessage('assistant', response);
            
            fullscreenSend.disabled = false;
            fullscreenInput.focus();
          }, 1500);
        }
      }
      
      // ============================================
      // AR DETECTION HANDLERS
      // ============================================
      window.onCareerFound = async function(career) {
        if (isTestMode || isTransitioning) return;
        
        // Show transition
        await showTransition(career);
        
        // Hide AR scene
        arContainer.style.opacity = '0.4';
        
        // Show fullscreen chat
        showFullscreenChat(career);
      };
      
      window.onCareerLost = function() {
        if (isTestMode || isTransitioning) return;
        
        arContainer.style.opacity = '1';
        hint.style.opacity = '1';
        fullscreenChat.classList.remove('active');
      };
      
      // ============================================
      // TEST MODE
      // ============================================
      function showTestPanel() {
        testBackdrop.classList.add('show');
        testPanel.style.display = 'block';
        setTimeout(() => testPanel.classList.add('show'), 10);
      }
      
      function hideTestPanel() {
        testBackdrop.classList.remove('show');
        testPanel.classList.remove('show');
        setTimeout(() => { if (!testPanel.classList.contains('show')) testPanel.style.display = 'none'; }, 300);
      }
      
      testBtn.addEventListener('click', showTestPanel);
      closeTestBtn.addEventListener('click', hideTestPanel);
      testBackdrop.addEventListener('click', hideTestPanel);
      
      document.querySelectorAll('.test-career-card').forEach(card => {
        card.addEventListener('click', async () => {
          const career = JSON.parse(card.dataset.career);
          isTestMode = true;
          hideTestPanel();
          
          await showTransition(career);
          arContainer.style.opacity = '0.4';
          showFullscreenChat(career);
        });
      });
      
      // ============================================
      // CLOSE CHAT
      // ============================================
      closeChatBtn.addEventListener('click', () => {
        fullscreenChat.classList.remove('active');
        arContainer.style.opacity = '1';
        hint.style.opacity = '1';
        isTestMode = false;
      });
      
      // Clear chat button
      // Clear chat button removed
      
      // ESC key to close
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (testPanel.classList.contains('show')) {
            hideTestPanel();
          } else if (fullscreenChat.classList.contains('active')) {
            closeChatBtn.click();
          }
        }
      });
      
    })();
  </script>
</body>
</html>
