<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Your Toy — Brighten</title>

  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/ar.css" />
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <!-- Mind AR: image recognition library, built on top of A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    /* Additional refined styles for test mode - maintaining exact design language */
    #test-mode-btn {
      background: rgba(255,255,255,0.15) !important;
      color: white !important;
      border: 1px solid rgba(255,255,255,0.3) !important;
      padding: 6px 12px !important;
      border-radius: 20px !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      font-family: var(--font-body) !important;
      transition: background 0.2s !important;
      text-decoration: none !important;
      display: inline-flex !important;
      align-items: center !important;
      gap: 4px !important;
    }
    
    #test-mode-btn:hover {
      background: rgba(255,255,255,0.25) !important;
    }
    
    #test-mode-panel {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      z-index: 300;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1);
      display: none;
      max-width: 360px;
      width: 90%;
      border: 2px solid var(--dark);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: panelPop 0.3s ease-out forwards;
    }
    
    #test-mode-panel.show {
      display: block;
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }
    
    @keyframes panelPop {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(0.9);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }
    
    .test-panel-title {
      margin-bottom: 20px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--dark);
      text-align: center;
      letter-spacing: -0.3px;
    }
    
    .test-career-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .test-career-card {
      padding: 16px 10px;
      border: 2px solid var(--dark);
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: var(--font-body);
      color: var(--dark);
      box-shadow: 4px 4px 0 var(--dark);
      text-align: center;
      animation: cardFloat 0.5s ease-out backwards;
    }
    
    .test-career-card:nth-child(1) { animation-delay: 0.00s; }
    .test-career-card:nth-child(2) { animation-delay: 0.05s; }
    .test-career-card:nth-child(3) { animation-delay: 0.10s; }
    .test-career-card:nth-child(4) { animation-delay: 0.15s; }
    .test-career-card:nth-child(5) { animation-delay: 0.20s; }
    .test-career-card:nth-child(6) { animation-delay: 0.25s; }
    
    @keyframes cardFloat {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .test-career-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 var(--dark);
      background: #fafafa;
    }
    
    .test-career-card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--dark);
    }
    
    .test-career-emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.1));
    }
    
    .test-career-name {
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-body);
    }
    
    .test-panel-close {
      width: 100%;
      padding: 12px;
      background: #f0f0f0;
      border: 2px solid var(--dark);
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      transition: all 0.2s;
      box-shadow: 3px 3px 0 var(--dark);
    }
    
    .test-panel-close:hover {
      background: var(--dark);
      color: white;
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--dark);
    }
    
    .test-panel-close:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 var(--dark);
    }
    
    /* Test mode overlay effect */
    #ar-container.test-mode-active {
      opacity: 0.5;
      transition: opacity 0.4s ease;
      filter: grayscale(0.3);
    }
    
    /* Test mode badge in chat header */
    .test-mode-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--dark);
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      margin-left: 10px;
      border: 1.5px solid var(--dark);
      font-family: var(--font-body);
      letter-spacing: 0.3px;
      animation: badgePulse 2s ease-in-out infinite;
    }
    
    @keyframes badgePulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
    }
    
    /* Backdrop overlay */
    .test-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      z-index: 250;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    
    .test-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <!-- 
       TOP BAR
       Floats above the camera view. Contains navigation links
       and the Brighten logo.
  -->
  <div id="top-bar">
    <a href="home.html">← Home</a>
    <img src="../assets/Brighten-logo.png" alt="Brighten" class="logo-img" />
    <div style="display: flex; gap: 8px;">
      <button id="test-mode-btn">🧪 Test</button>
      <a href="careers.html">Careers</a>
    </div>
  </div>

  <!-- Backdrop for test mode panel -->
  <div class="test-backdrop" id="test-backdrop"></div>

  <!-- Test mode panel (hidden by default) -->
  <div id="test-mode-panel">
    <div class="test-panel-title">✨ Select a Career to Test</div>
    <div class="test-career-grid">
      <div class="test-career-card" data-career='{"id":"programmer","name":"Programmer"}'>
        <span class="test-career-emoji">💻</span>
        <span class="test-career-name">Programmer</span>
      </div>
      <div class="test-career-card" data-career='{"id":"police","name":"Police Officer"}'>
        <span class="test-career-emoji">👮</span>
        <span class="test-career-name">Police</span>
      </div>
      <div class="test-career-card" data-career='{"id":"teacher","name":"Teacher"}'>
        <span class="test-career-emoji">📚</span>
        <span class="test-career-name">Teacher</span>
      </div>
      <div class="test-career-card" data-career='{"id":"farmer","name":"Farmer"}'>
        <span class="test-career-emoji">🌾</span>
        <span class="test-career-name">Farmer</span>
      </div>
      <div class="test-career-card" data-career='{"id":"doctor","name":"Doctor"}'>
        <span class="test-career-emoji">👨‍⚕️</span>
        <span class="test-career-name">Doctor</span>
      </div>
      <div class="test-career-card" data-career='{"id":"astronaut","name":"Astronaut"}'>
        <span class="test-career-emoji">🚀</span>
        <span class="test-career-name">Astronaut</span>
      </div>
    </div>
    <button class="test-panel-close" id="close-test-panel">Cancel</button>
  </div>

  <!-- Scanning hint shown before any toy is detected.
       Fades out automatically once a target is found. -->
  <div id="hint">📷 Point at your toy to scan</div>

  <!-- AR SCENE -->
  <div id="ar-container">
    <a-scene
      mindar-image="imageTargetSrc: ../assets/targets.mind;"
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true"
    >
      <!-- Programmer (targetIndex: 0) -->
      <a-entity mindar-image-target="targetIndex: 0" id="ar-target-0">
        <a-image src="../assets/characters/char-programmer.png"
          position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>

      <!-- Police Officer (targetIndex: 1) -->
      <a-entity mindar-image-target="targetIndex: 1" id="ar-target-1">
        <a-image src="../assets/characters/char-police.png"
          position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>

      <!-- Teacher (targetIndex: 2) -->
      <a-entity mindar-image-target="targetIndex: 2" id="ar-target-2">
        <a-image src="../assets/characters/char-teacher.png"
          position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>

      <!-- Farmer (targetIndex: 3) -->
      <a-entity mindar-image-target="targetIndex: 3" id="ar-target-3">
        <a-image src="../assets/characters/char-farmer.png"
          position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>

      <!-- Doctor (targetIndex: 4) -->
      <a-entity mindar-image-target="targetIndex: 4" id="ar-target-4">
        <a-image src="../assets/characters/char-doctor.png"
          position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>

      <!-- Astronaut (targetIndex: 5) -->
      <a-entity mindar-image-target="targetIndex: 5" id="ar-target-5">
        <a-image src="../assets/characters/char-astronaut.png"
          position="0 0.5 0" width="1" height="1.5"></a-image>
      </a-entity>

      <!-- The virtual camera — represents the phone camera viewpoint -->
      <a-camera position="0 0 0"></a-camera>
    </a-scene>
  </div>

  <!-- CHAT UI-->
  <div id="chat-ui" style="display:none;">

    <!-- Character name shown at the top of the chat panel -->
    <div id="chat-character-name"></div>

    <!-- Scrollable message history (user + assistant bubbles) -->
    <div id="chat-messages"></div>

    <div id="chat-input-area">

      <!-- Quick-tap preset question buttons populated by chat.js -->
      <div id="chat-presets"></div>

      <!-- Free-text input row -->
      <div id="chat-input-row">
        <input type="text" id="chat-input" placeholder="Ask me anything..." />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>


  <script src="../js/ar.js"></script>
  <script src="../js/chat.js"></script>
  <script>
    (function() {
      'use strict';
      
      // State management
      let isTestMode = false;
      let currentCareerName = '';
      
      // DOM elements
      const testBtn = document.getElementById('test-mode-btn');
      const testPanel = document.getElementById('test-mode-panel');
      const testBackdrop = document.getElementById('test-backdrop');
      const closeBtn = document.getElementById('close-test-panel');
      const arContainer = document.getElementById('ar-container');
      const hint = document.getElementById('hint');
      const chatUI = document.getElementById('chat-ui');
      const chatNameEl = document.getElementById('chat-character-name');
      
      // Helper: Show test panel with animation
      function showTestPanel() {
        testBackdrop.classList.add('show');
        testPanel.style.display = 'block';
        // Force reflow
        testPanel.offsetHeight;
        testPanel.classList.add('show');
      }
      
      // Helper: Hide test panel with animation
      function hideTestPanel() {
        testBackdrop.classList.remove('show');
        testPanel.classList.remove('show');
        setTimeout(() => {
          if (!testPanel.classList.contains('show')) {
            testPanel.style.display = 'none';
          }
        }, 300);
      }
      
      // Helper: Enter test mode
      function enterTestMode(career) {
        isTestMode = true;
        currentCareerName = career.name;
        
        // Update UI
        hint.style.opacity = '0';
        chatUI.style.display = 'flex';
        arContainer.classList.add('test-mode-active');
        
        // Initialize chat
        initChat(career);
        
        // Add test mode badge to chat header
        const originalContent = chatNameEl.innerHTML;
        if (!chatNameEl.querySelector('.test-mode-badge')) {
          const badge = document.createElement('span');
          badge.className = 'test-mode-badge';
          badge.textContent = 'TEST';
          chatNameEl.appendChild(badge);
        }
      }
      
      // Helper: Exit test mode
      function exitTestMode() {
        isTestMode = false;
        currentCareerName = '';
        arContainer.classList.remove('test-mode-active');
        chatUI.style.display = 'none';
        hint.style.opacity = '1';
      }
      
      // Event: Test button click
      testBtn.addEventListener('click', showTestPanel);
      
      // Event: Close panel
      closeBtn.addEventListener('click', hideTestPanel);
      
      // Event: Click backdrop to close
      testBackdrop.addEventListener('click', hideTestPanel);
      
      // Event: Career card selection
      document.querySelectorAll('.test-career-card').forEach(card => {
        card.addEventListener('click', (e) => {
          const career = JSON.parse(card.dataset.career);
          hideTestPanel();
          enterTestMode(career);
        });
      });
      
      // Event: Escape key to close
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && testPanel.classList.contains('show')) {
          hideTestPanel();
        }
      });
      
      // Override global AR functions (called by ar.js)
      window.onCareerFound = function(career) {
        // If in test mode, ignore AR detection
        if (isTestMode) return;
        
        hint.style.opacity = '0';
        chatUI.style.display = 'flex';
        arContainer.classList.remove('test-mode-active');
        initChat(career);
      };
      
      window.onCareerLost = function() {
        // If in test mode, don't hide chat
        if (isTestMode) return;
        
        hint.style.opacity = '1';
        chatUI.style.display = 'none';
      };
      
      // Clean up on page unload
      window.addEventListener('beforeunload', () => {
        isTestMode = false;
      });
      
      // Prevent panel close when clicking inside panel
      testPanel.addEventListener('click', (e) => {
        e.stopPropagation();
      });
      
    })();
  </script>
</body>
</html>
